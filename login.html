<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>登录 - AI导演工作室</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-box">
<h2>用户登录</h2>
<input placeholder="请输入账号" id="user">
<input placeholder="请输入密码" type="password" id="pwd">
<button onclick="login()">登录</button>
<p style="margin-top:15px">没有账号？<a href="#" style="color:#4a6cf7">注册</a></p>
</div>
<script>
function login(){localStorage.setItem('token','login');location.href='index.html'}
</script>
</body>
</html>
